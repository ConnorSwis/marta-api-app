<main id="body" class="view-body" data-view="arrivals">
  <section class="panel">
    <div class="panel-header">
      <h2 class="panel-title">Live train arrivals</h2>
      <p class="panel-subtitle">Auto-refresh every 30 seconds.</p>
    </div>

    <form
      id="arrivals-filters"
      class="filters-grid"
      hx-get="{{ request.state.domain }}/htmx/arrivals/component/stations"
      hx-target="#stations"
      hx-swap="outerHTML"
      hx-trigger="change, keyup changed delay:350ms from:#arrivals-query"
      hx-indicator="#global-indicator"
    >
      <div>
        <span class="field-label">Line</span>
        <div class="line-radio-group">
          <input class="line-radio" type="radio" name="line" id="line-all" value="" checked />
          <label class="line-chip" for="line-all">All</label>

          <input class="line-radio" type="radio" name="line" id="line-red" value="red" />
          <label class="line-chip line-red" data-line="red" for="line-red">Red</label>

          <input class="line-radio" type="radio" name="line" id="line-gold" value="gold" />
          <label class="line-chip line-gold" data-line="gold" for="line-gold">Gold</label>

          <input class="line-radio" type="radio" name="line" id="line-blue" value="blue" />
          <label class="line-chip line-blue" data-line="blue" for="line-blue">Blue</label>

          <input class="line-radio" type="radio" name="line" id="line-green" value="green" />
          <label class="line-chip line-green" data-line="green" for="line-green">Green</label>
        </div>
      </div>

      <div>
        <label class="field-label" for="arrivals-direction">Direction</label>
        <select class="select-input" id="arrivals-direction" name="direction">
          <option value="">Any direction</option>
          <option value="n">Northbound</option>
          <option value="s">Southbound</option>
          <option value="e">Eastbound</option>
          <option value="w">Westbound</option>
        </select>
      </div>

      <div>
        <label class="field-label" for="arrivals-query">Station or destination</label>
        <input
          class="text-input"
          id="arrivals-query"
          name="q"
          type="text"
          placeholder="Midtown"
          autocomplete="off"
        />
      </div>

      <div class="filters-actions">
        <button class="btn btn-secondary" type="button" id="arrivals-clear">Reset</button>

        <div>
          <label class="field-label" for="arrivals-per-station">Rows per station</label>
          <select class="select-input" id="arrivals-per-station" name="per_station">
            <option value="4">4</option>
            <option value="6" selected>6</option>
            <option value="8">8</option>
            <option value="10">10</option>
          </select>
        </div>
      </div>
    </form>
  </section>

  <section
    id="stations"
    class="panel"
    hx-get="{{ request.state.domain }}/htmx/arrivals/component/stations"
    hx-trigger="load"
    hx-include="#arrivals-filters"
    hx-swap="outerHTML"
    hx-indicator="#global-indicator"
  >
    <p class="placeholder">Loading arrivals</p>
  </section>
</main>
