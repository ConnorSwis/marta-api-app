<main id="body" class="px-6 pt-2 pb-6 font-sans bg-gray-100">
  <div class="flex justify-center gap-4 mb-4">
    <button
      id="unselect-button"
      class="relative w-12 h-12 font-bold text-center text-white rounded-full hover:opacity-80 focus:outline-none focus:ring-4 focus:ring-gray-700 quadrant-bg"
      hx-get="/htmx/arrivals/component/stations"
      hx-target="#stations"
      hx-swap="outerHTML"
    ></button>
    <button
      class="w-12 h-12 rounded-full font-bold text-white text-center leading-[3rem] bg-red-500 hover:opacity-80 focus:outline-none focus:ring-4 focus:ring-gray-700"
      hx-get="/htmx/arrivals/component/stations?line=red"
      hx-target="#stations"
      hx-swap="outerHTML"
    ></button>

    <button
      class="w-12 h-12 rounded-full font-bold text-white text-center leading-[3rem] bg-yellow-400 hover:opacity-80 focus:outline-none focus:ring-4 focus:ring-gray-700"
      hx-get="/htmx/arrivals/component/stations?line=gold"
      hx-target="#stations"
      hx-swap="outerHTML"
    ></button>

    <button
      class="w-12 h-12 rounded-full font-bold text-white text-center leading-[3rem] bg-blue-500 hover:opacity-80 focus:outline-none focus:ring-4 focus:ring-gray-700"
      hx-get="/htmx/arrivals/component/stations?line=blue"
      hx-target="#stations"
      hx-swap="outerHTML"
    ></button>

    <button
      class="w-12 h-12 rounded-full font-bold text-white text-center leading-[3rem] bg-green-600 hover:opacity-80 focus:outline-none focus:ring-4 focus:ring-gray-700"
      hx-get="/htmx/arrivals/component/stations?line=green"
      hx-target="#stations"
      hx-swap="outerHTML"
    ></button>
  </div>

  <!-- Search Bar with Clear Button -->
  <div class="flex justify-center mb-4">
    <div class="flex items-center w-1/2 p-2">
      <!-- Clear Button -->
      <button
        id="clear-button"
        class="mr-2 text-gray-500 transition-opacity duration-200 opacity-0 pointer-events-none hover:text-gray-700"
        onclick="clearSearch()"
        aria-label="Clear search"
      >
        &#x2715;
        <!-- Unicode for 'X' symbol -->
      </button>

      <!-- Search Input -->
      <input
        type="text"
        id="station-search"
        class="flex-grow p-2 border-none outline-none"
        placeholder="Search for a station..."
        oninput="filterStations()"
      />
    </div>
  </div>

  <div
    id="stations"
    class="text-center"
    hx-trigger="load"
    hx-get="/htmx/arrivals/component/stations/"
    hx-swap="outerHTML"
  ></div>
  <style>
    .quadrant-bg {
      background: conic-gradient(
        rgb(239 68 68) 0deg 90deg,
        rgb(250 204 21) 90deg 180deg,
        rgb(59 130 246) 180deg 270deg,
        rgb(22 163 74) 270deg 360deg
      );
    }
    .quadrant-bg:hover {
      opacity: 0.8;
    }
  </style>
  <script>
    // Function to filter stations based on input
    function filterStations() {
      const searchInput = document
        .getElementById("station-search")
        .value.toLowerCase();
      const stationCards = document.querySelectorAll(".station-card");

      stationCards.forEach((card) => {
        const stationName = card
          .getAttribute("data-station-name")
          .toLowerCase();
        if (stationName.includes(searchInput)) {
          card.style.display = "block";
        } else {
          card.style.display = "none";
        }
      });

      // Toggle visibility of the clear button
      const clearButton = document.getElementById("clear-button");
      if (searchInput.length > 0) {
        clearButton.classList.remove("opacity-0", "pointer-events-none");
        clearButton.classList.add("opacity-100");
      } else {
        clearButton.classList.add("opacity-0", "pointer-events-none");
        clearButton.classList.remove("opacity-100");
      }
    }

    // Function to clear the search input
    function clearSearch() {
      const searchInput = document.getElementById("station-search");
      searchInput.value = "";
      filterStations();
      searchInput.focus();
    }

    // Initialize filter on page load
    document.addEventListener("htmx:load", filterStations);

    // Highlight selected filter button
    document.querySelectorAll(".w-12").forEach((button) => {
      button.addEventListener("click", (event) => {
        document
          .querySelectorAll(".ring-4")
          .forEach((btn) => btn.classList.remove("ring-4", "ring-gray-700"));
        event.currentTarget.classList.add("ring-4", "ring-gray-700");
      });
    });

    // Trigger default filter
    const unselect = document.getElementById("unselect-button");
    if (unselect) {
      unselect.click();
    }

    // Function to set station filter (if needed elsewhere)
    function setStationFilter(event) {
      const stationName = event.target.dataset.stationName;
      document.getElementById("station-search").value = stationName;
      filterStations();
    }
  </script>
</main>
