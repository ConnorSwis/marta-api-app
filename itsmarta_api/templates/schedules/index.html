<main id="body" class="view-body" data-view="schedules">
  <section class="panel">
    <div class="panel-header">
      <h2 class="panel-title">Train schedules</h2>
      <p class="panel-subtitle">Choose a line to load timetable data.</p>
    </div>

    <div class="schedule-line-row" id="schedule-line-switcher">
      <button
        class="schedule-line-btn line-red is-active"
        data-line="red"
        hx-get="{{ request.state.domain }}/htmx/schedule/red"
        hx-target="#schedule-content"
        hx-swap="innerHTML"
        hx-trigger="load"
        hx-indicator="#global-indicator"
      >
        Red
      </button>

      <button
        class="schedule-line-btn line-gold"
        data-line="gold"
        hx-get="{{ request.state.domain }}/htmx/schedule/gold"
        hx-target="#schedule-content"
        hx-swap="innerHTML"
        hx-indicator="#global-indicator"
      >
        Gold
      </button>

      <button
        class="schedule-line-btn line-blue"
        data-line="blue"
        hx-get="{{ request.state.domain }}/htmx/schedule/blue"
        hx-target="#schedule-content"
        hx-swap="innerHTML"
        hx-indicator="#global-indicator"
      >
        Blue
      </button>

      <button
        class="schedule-line-btn line-green"
        data-line="green"
        hx-get="{{ request.state.domain }}/htmx/schedule/green"
        hx-target="#schedule-content"
        hx-swap="innerHTML"
        hx-indicator="#global-indicator"
      >
        Green
      </button>
    </div>
  </section>

  <section id="schedule-content" class="panel schedule-content">
    <p class="placeholder">Loading schedule</p>
  </section>
</main>
